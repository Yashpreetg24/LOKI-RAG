services:
  - type: web
    name: loki-rag
    runtime: python
    region: oregon
    plan: free
    branch: main

    buildCommand: pip install -r requirements.txt

    # Gunicorn is more robust than Flask's dev server in production.
    startCommand: gunicorn run:app -w 1 --timeout 120 --bind 0.0.0.0:$PORT

    healthCheckPath: /api/health

    envVars:
      # ── Hosting flag — tells run.py to activate Groq + Pinecone mode ─────────
      - key: LOKI_HOSTED_MODE
        value: "1"

      # ── LLM (Groq) ────────────────────────────────────────────────────────────
      - key: LOKI_VAULT_TOKEN
        sync: false          # Set manually in Render (Groq API Key)
      - key: LOKI_CLOUD_BRAIN
        value: llama-3.1-8b-instant

      # ── Vector store (Pinecone) ───────────────────────────────────────────────
      - key: LOKI_VECTOR_KEY
        sync: false          # Set manually in Render (Pinecone API Key)
      - key: LOKI_VECTOR_INDEX
        value: rag-terminal

      # ── Embeddings ────────────────────────────────────────────────────────────
      - key: LOKI_EMBED_CORE
        value: sentence-transformers/all-MiniLM-L6-v2

      # ── Chunking ──────────────────────────────────────────────────────────────
      - key: LOKI_SLICE_SIZE
        value: "500"
      - key: LOKI_SLICE_OVERLAP
        value: "50"

      # ── Flask / Server ────────────────────────────────────────────────────────
      - key: LOKI_NODE_HOST
        value: "0.0.0.0"
      - key: LOKI_DEBUG_MODE
        value: "false"

      # ── Upload ────────────────────────────────────────────────────────────────
      - key: LOKI_DATA_STREAM
        value: /tmp/uploads
      - key: LOKI_MAX_PAYLOAD
        value: "16777216"
      - key: LOKI_ALLOWED_TYPES
        value: pdf,txt,md
