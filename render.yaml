services:
  - type: web
    name: loki-rag
    runtime: python
    region: oregon
    plan: free
    branch: main

    buildCommand: pip install -r requirements.txt

    # Gunicorn is more robust than Flask's dev server in production.
    startCommand: gunicorn run:app -w 1 --timeout 120 --bind 0.0.0.0:$PORT

    healthCheckPath: /  # Use the root page for a faster check during startup

    envVars:
      # ── Hosting flag ─────────
      - key: RENDER
        value: "1"

      # ── LLM & Embeddings ───────────
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: HF_TOKEN
        sync: false

      # ── Vector store (Pinecone) ──────────
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        value: rag-terminal

      # ── Embeddings ───────────
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2

      # ── Chunking ─────────────
      - key: CHUNK_SIZE
        value: "500"
      - key: CHUNK_OVERLAP
        value: "50"

      # ── Flask / Server ───────
      - key: FLASK_HOST
        value: "0.0.0.0"
      - key: FLASK_DEBUG
        value: "false"

      # ── Upload ───────────────
      - key: UPLOAD_FOLDER
        value: /tmp/uploads
      - key: MAX_CONTENT_LENGTH
        value: "16777216"
      - key: ALLOWED_EXTENSIONS
        value: pdf,txt,md
